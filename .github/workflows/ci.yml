name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}${{ matrix.enable_tsan == 'ON' && ' / TSan' || '' }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu GCC — Debug + TSan
          - os: ubuntu-latest
            compiler: GCC
            cc: gcc
            cxx: g++
            build_type: Debug
            enable_tsan: "ON"

          # Ubuntu GCC — Release
          - os: ubuntu-latest
            compiler: GCC
            cc: gcc
            cxx: g++
            build_type: Release
            enable_tsan: "OFF"

          # macOS Clang — Debug
          - os: macos-latest
            compiler: Clang
            cc: clang
            cxx: clang++
            build_type: Debug
            enable_tsan: "OFF"

          # macOS Clang — Release
          - os: macos-latest
            compiler: Clang
            cc: clang
            cxx: clang++
            build_type: Release
            enable_tsan: "OFF"

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DJOBQ_ENABLE_TSAN=${{ matrix.enable_tsan }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --no-tests=error -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

  static-analysis:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --std=c++20 \
            --suppress=missingIncludeSystem \
            src/
